<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Siyan | Profile</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      font-family: "Segoe UI", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 340px;
      padding: 25px 20px;
      text-align: center;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #f8c8dc;
      margin-bottom: 10px;
    }

    .name {
      font-size: 22px;
      font-weight: 600;
      color: #333;
    }

    .handle {
      color: #888;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 14px;
      color: #555;
      line-height: 1.5;
      margin-bottom: 20px;
      padding: 0 10px;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .social-links a {
      color: #555;
      font-size: 20px;
      transition: 0.3s;
    }

    .social-links a:hover {
      color: #e91e63;
      transform: scale(1.2);
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      transition: 0.3s;
    }

    .follow {
      background: #e91e63;
      color: white;
    }

    .follow:hover {
      background: #d81b60;
    }

    .message {
      background: #f1f1f1;
    }

    .message:hover {
      background: #e0e0e0;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- 🔥 YOUR IMAGE HERE -->
  <img src="img.jpg" class="profile-img" alt="Siyan" />

  <div class="name">Siyan S Idicula</div>
  
  <div class="tagline">
    Tech Enthusiast  |  Passionate about design, coding & innovation 🌸
  </div>

  <div class="social-links">

    <a href="https://github.com/siyansidicula" target="_blank">
      <i class="fa-brands fa-github"></i>
    </a>

    <a href="https://www.linkedin.com/in/siyan-s-idicula-b71a0b339/" target="_blank">
      <i class="fa-brands fa-linkedin"></i>
    </a>

  </div>

  <div class="actions">
    <button class="btn follow">Follow</button>
    <button class="btn message">Message</button>
  </div>

  <div class="footer">
    © 2026 Siyan S Idicula
  </div>

</div>

</body>
</html>
